services:
  - type: web
    name: etat-civil-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://lelourou.github.io"
      - key: DB_NAME
        fromDatabase:
          name: etat-civil-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: etat-civil-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: etat-civil-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: etat-civil-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: etat-civil-db
          property: port

databases:
  - name: etat-civil-db
    databaseName: etat_civil_db
    plan: free
